<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM OIKOS MEDIA</title>
  <style>
    /* ... Tus estilos existentes permanecen intactos ... */
    
    /* Clases de utilidad requeridas para la nueva interfaz sin romper el flujo */
    .gone { display: none !important; }
  </style>
</head>
<body>

  <div id="login-screen" style="position:fixed; inset:0; background:var(--void, #0d0d0d); z-index:10000; display:flex; align-items:center; justify-content:center;">
    <div class="card msm" style="width:340px; padding:30px; border:1px solid var(--rim3, #333); background:#141414; border-radius:8px; font-family:sans-serif;">
      <div class="ll" style="text-align:center; margin-bottom:20px; color:#fff; font-size:18px; letter-spacing:1px;">ADM <b>OIKOS</b> MEDIA</div>
      
      <div class="fg" style="margin-bottom:15px;">
        <label style="display:block; color:#aaa; font-size:12px; margin-bottom:5px;">Correo Electrónico</label>
        <input type="email" id="login-email" placeholder="usuario@oikos.media" style="width:100%; padding:10px; background:#1c1c1c; border:1px solid var(--rim, #222); color:#fff; border-radius:4px; box-sizing:border-box;">
      </div>
      
      <div class="fg" style="margin-bottom:20px;">
        <label style="display:block; color:#aaa; font-size:12px; margin-bottom:5px;">Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" style="width:100%; padding:10px; background:#1c1c1c; border:1px solid var(--rim, #222); color:#fff; border-radius:4px; box-sizing:border-box;">
      </div>
      
      <button class="btn bP2" style="width:100%; justify-content:center; padding:11px; background:#fff; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="loginUsuario()">Iniciar Sesión</button>
      <div id="login-error" style="color:#ff4a4a; font-size:11px; text-align:center; margin-top:10px; display:none;"></div>
    </div>
  </div>

  <div id="ld">
    </div>

  <div id="app-structure">
    <nav id="sb">
      <div class="sbi" onclick="cerrarSesion()" style="margin-top:20px; border-top:1px solid var(--rim, #222); padding-top:15px; color:#ff4a4a; cursor:pointer; display:flex; align-items:center; gap:10px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px; height:18px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Cerrar Sesión</span>
      </div>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Tu configuración original de Firebase
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT.firebaseapp.com",
      databaseURL: "https://TU_PROJECT-default-rtdb.firebaseio.com",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_PROJECT.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const auth = getAuth(app);

      // Mapeo seguro para el script global (Clásico) sin colisionar variables
      window._fbDB = db; 
      window._fbRef = ref; 
      window._fbSet = set; 
      window._fbGet = get; 
      window._fbOnValue = onValue;
      window._fbAuth = auth; 
      window._fbSignIn = signInWithEmailAndPassword; 
      window._fbSignOut = signOut; 
      window._fbOnAuth = onAuthStateChanged;

      // Notificar que Firebase está listo
      window.dispatchEvent(new Event('firebase-ready'));
    } catch(e) { 
      console.error("Error inicializando Firebase:", e);
      window.dispatchEvent(new Event('firebase-ready')); 
    }
  </script>

  <script>
    // Variables globales de tus módulos (Mantienen su nombre original para que tus funciones no se rompan)
    let db, ref, set, get, onValue; 
    let datosCargados = false; // Bandera de optimización para evitar duplicar listeners

    // Escuchador de inicialización y verificación de estado
    window.addEventListener('firebase-ready', () => {
      if (window._fbOnAuth && window._fbAuth) {
        
        // El observador en tiempo real gestiona si el usuario tiene permitido ver la app o no
        window._fbOnAuth(window._fbAuth, (user) => {
          if (user) {
            // 1. Ocultar pantalla de login de manera fluida
            document.getElementById('login-screen').style.display = 'none';
            
            // 2. Asignar las referencias a tus variables globales originales de bases de datos
            db = window._fbDB;
            ref = window._fbRef;
            set = window._fbSet;
            get = window._fbGet;
            onValue = window._fbOnValue;

            // 3. Funcionalidad optimizada: Solo inicializa los listeners de datos una vez por sesión
            if (!datosCargados) {
              inicializarEstructuraDatos();
              datosCargados = true;
            }
          } else {
            // Si el usuario no está autenticado, forzar el login y limpiar la interfaz
            document.getElementById('login-screen').style.display = 'flex';
            const loader = document.getElementById('ld');
            if (loader) loader.classList.add('gone');
          }
        });
      }
    });

    // Encapsula aquí tus llamadas originales a Firebase como onValue() o leer BD
    function inicializarEstructuraDatos() {
      console.log("Conexión segura establecida. Cargando módulos de la base de datos...");
      
      // Aquí ejecutas las funciones de renderizado que tenías al inicio de tu app
      // Ejemplo:
      // onValue(ref(db, 'proyectos'), (snapshot) => { ... renderizarTablas() ... });
      
      // Una vez todo mapeado, removemos el loader principal
      const loader = document.getElementById('ld');
      if (loader) loader.classList.add('gone');
    }

    // Lógica del Formulario de Login
    async function loginUsuario() {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      const errorEl = document.getElementById('login-error');
      
      if (!email || !pass) {
        errorEl.textContent = "Por favor, completa todos los campos.";
        errorEl.style.display = "block";
        return;
      }

      try {
        errorEl.style.display = "none";
        // Loader visual temporal en el botón
        const btn = document.querySelector('#login-screen .btn');
        const txtOriginal = btn.textContent;
        btn.textContent = "Verificando...";
        btn.disabled = true;

        await window._fbSignIn(window._fbAuth, email, pass);
      } catch (error) {
        console.error("Error Auth:", error.code);
        errorEl.style.display = "block";
        // Mensajes limpios adaptados al usuario
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
          errorEl.textContent = "Acceso denegado. Credenciales incorrectas.";
        } else if (error.code === 'auth/too-many-requests') {
          errorEl.textContent = "Demasiados intentos. Inténtalo más tarde.";
        } else {
          errorEl.textContent = "Error de conexión con el servidor de autenticación.";
        }
        
        // Restaurar botón
        const btn = document.querySelector('#login-screen .btn');
        btn.textContent = "Iniciar Sesión";
        btn.disabled = false;
      }
    }

    // Lógica de Cierre de Sesión seguro
    async function cerrarSesion() {
      if (confirm('¿Estás seguro de que deseas salir del administrador de Oikos Media?')) {
        try {
          await window._fbSignOut(window._fbAuth);
          // Forzar recarga limpia para destruir de memoria cualquier residuo de datos del panel
          location.reload();
        } catch (e) {
          alert('Error al procesar el cierre de sesión.');
        }
      }
    }

    // ... Todas tus funciones originales de lógica de negocio (abrir modales, procesar formularios, cálculos) permanecen exactamente abajo de esta línea sin alteración ...
  </script>

</body>
</html>
